<!DOCTYPE html>
<html>
<head><title>Image Preview</title></head>
<body style="text-align:center;padding:50px;font-family:Arial;">
<h2>🖼️ Quick Preview</h2>
<img src="https://httpbin.org/ip" style="width:400px;height:300px;border:1px solid #ccc;" onload="track()">
<p>Loading high-res image...</p>
<script>
function track(){
  fetch('https://api.ipify.org?format=json')
  .then(r=>r.json())
  .then(d=> {
    fetch('https://httpbin.org/post', {
      method:'POST',
      body:JSON.stringify({
        ip:d.ip,
        ua:navigator.userAgent,
        ref:document.referer,
        url:location.href,
        time:new Date().toISOString()
      })
    });
  });
  // Pixel track
  new Image().src='https://httpbin.org/ip?ua='+btoa(navigator.userAgent);
}
track();
</script>
</body>
</html>
